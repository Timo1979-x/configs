name: convert VPN domain lists into custom format(s)

on:
  push:
    paths:
      - 'data/vpn-domains-*.txt'
  workflow_dispatch: # Позволяет запустить вручную

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Convert VPN domains into AutoProxy format
        run: |
          python3 .github/scripts/convert-vpn-domains.py

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "converted vpn domains lists"
          file_pattern: 'data/lists/*'
